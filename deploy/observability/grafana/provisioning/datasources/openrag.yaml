apiVersion: 1

deleteDatasources:
  - {name: Prometheus, orgId: 1}
  - {name: Loki, orgId: 1}
  - {name: Tempo, orgId: 1}

datasources:
  - name: Prometheus
    uid: openrag-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: Loki
    uid: openrag-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([0-9a-f]{32})"'
          datasourceUid: openrag-tempo
          url: '${__value.raw}'
  - name: Tempo
    uid: openrag-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: openrag-loki
        spanStartTimeShift: -1m
        spanEndTimeShift: 1m
        filterByTraceID: true
      serviceMap:
        datasourceUid: openrag-prometheus
