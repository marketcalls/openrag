extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 384
    spike_limit_mib: 96
  attributes/sanitize:
    actions:
      - {key: authorization, action: delete}
      - {key: cookie, action: delete}
      - {key: password, action: delete}
      - {key: secret, action: delete}
      - {key: token, action: delete}
      - {key: api_key, action: delete}
      - {key: prompt, action: delete}
      - {key: response, action: delete}
      - {key: content, action: delete}
      - {key: document_text, action: delete}
      - {key: retrieved_text, action: delete}
      - {key: memory, action: delete}
      - {key: filename, action: delete}
      - {key: exception.message, action: delete}
      - {key: exception.stacktrace, action: delete}
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: openrag
    resource_to_telemetry_conversion:
      enabled: true
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      queue_size: 2048
    retry_on_failure:
      enabled: true
      max_elapsed_time: 60s
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    sending_queue:
      enabled: true
      queue_size: 2048
    retry_on_failure:
      enabled: true
      max_elapsed_time: 60s

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: warn
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/sanitize, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/sanitize, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/sanitize, batch]
      exporters: [otlphttp/loki]
