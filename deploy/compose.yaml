name: openrag

x-openrag-environment: &openrag-environment
  OPENRAG_DATABASE_URL: postgresql+asyncpg://openrag:openrag@postgres:5432/openrag
  OPENRAG_REDIS_URL: redis://redis:6379/0
  OPENRAG_ENVIRONMENT: ${OPENRAG_ENVIRONMENT:-dev}
  OPENRAG_QDRANT_URL: http://qdrant:6333
  OPENRAG_MINIO_ENDPOINT: http://minio:9000
  OPENRAG_MINIO_ACCESS_KEY: openrag
  OPENRAG_MINIO_SECRET_KEY: openrag123
  OPENRAG_MINIO_BUCKET: openrag-documents
  OPENRAG_TEI_URL: http://tei:80
  OPENRAG_EMBEDDING_BACKEND: ${OPENRAG_EMBEDDING_BACKEND:-hash}
  OPENRAG_EMBEDDING_DIM: ${OPENRAG_EMBEDDING_DIM:-1024}
  OPENRAG_INGEST_REVISION_PROTOCOL_V2_ENABLED: ${OPENRAG_INGEST_REVISION_PROTOCOL_V2_ENABLED:-false}
  OPENRAG_STALE_INGEST_RECOVERY_SECONDS: ${OPENRAG_STALE_INGEST_RECOVERY_SECONDS:-900}
  OPENRAG_LITELLM_URL: http://litellm:4000
  OPENRAG_LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-openrag-dev-master}
  OPENRAG_KEK_FILE: /data/openrag_kek

x-openrag-backend: &openrag-backend
  image: openrag-backend:local
  build:
    context: ../backend
  environment: *openrag-environment
  volumes:
    - kekdata:/data

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openrag
      POSTGRES_PASSWORD: openrag
      POSTGRES_DB: openrag
    ports: ["127.0.0.1:55432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/10-litellm.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrag"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:56379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  event-redis:
    image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        password="$$(cat /run/secrets/event_redis_password)"
        test "$${#password}" -ge 16
        exec redis-server \
          --appendonly yes \
          --appendfsync always \
          --save "" \
          --dir /data \
          --user default off \
          --user openrag on ">$${password}" "~openrag:*" \
          +ping +info "+config|get" +xadd +xgroup +xinfo \
          +xreadgroup +xack +xautoclaim +xpending +waitaof
    secrets:
      - event_redis_password
    networks:
      - event-network
    volumes:
      - eventredisdata:/data
    mem_limit: 512m
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          REDISCLI_AUTH="$$(cat /run/secrets/event_redis_password)"
          redis-cli --user openrag ping
      interval: 5s
      timeout: 3s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports: ["127.0.0.1:56333:6333"]
    volumes: [qdrantdata:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: openrag
      MINIO_ROOT_PASSWORD: openrag123
    ports: ["127.0.0.1:59000:9000", "127.0.0.1:59001:9001"]
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    profiles: ["ml"]
    command: --model-id BAAI/bge-m3
    ports: ["127.0.0.1:58080:80"]
    volumes: [teidata:/data]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/80' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.72.6-stable
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-openrag-dev-master}
      DATABASE_URL: postgresql://openrag:openrag@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
    ports: ["127.0.0.1:54000:4000"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:4000/health/liveliness')
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    <<: *openrag-backend
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bootstrap:
    <<: *openrag-backend
    command: ["/app/.venv/bin/python", "-m", "openrag.bootstrap"]
    environment:
      <<: *openrag-environment
      OPENRAG_BOOTSTRAP_EMAIL: ${OPENRAG_BOOTSTRAP_EMAIL:-root@openrag.internal}
      OPENRAG_BOOTSTRAP_PASSWORD: ${OPENRAG_BOOTSTRAP_PASSWORD:-changeme123}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/uvicorn
      - --factory
      - openrag.api.app:create_app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports: ["127.0.0.1:${OPENRAG_API_PORT:-8000}:8000"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/readyz')
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - interactive,default
      - -l
      - info
      - --concurrency=1
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  event-scheduler:
    image: openrag-backend:local
    build:
      context: ../backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - beat
      - -l
      - info
      - --schedule=/tmp/celerybeat-schedule
      - --pidfile=/tmp/celerybeat.pid
    environment:
      OPENRAG_REDIS_URL: redis://redis:6379/0
      OPENRAG_ENVIRONMENT: ${OPENRAG_ENVIRONMENT:-dev}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    restart: unless-stopped

  event-worker:
    image: openrag-backend:local
    build:
      context: ../backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - events
      - -l
      - info
      - --concurrency=2
      - --hostname=event@%h
    environment:
      OPENRAG_DATABASE_URL: postgresql+asyncpg://openrag:openrag@postgres:5432/openrag
      OPENRAG_REDIS_URL: redis://redis:6379/0
      OPENRAG_EVENT_REDIS_URL: redis://openrag@event-redis:6379/0
      OPENRAG_EVENT_REDIS_PASSWORD_FILE: /run/secrets/event_redis_password
      OPENRAG_ENVIRONMENT: ${OPENRAG_ENVIRONMENT:-dev}
    secrets:
      - event_redis_password
    networks:
      - default
      - event-network
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      event-redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -m
        - openrag.worker.event_runtime
        - ready
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    restart: unless-stopped

  web:
    image: openrag-frontend:local
    build:
      context: ../frontend
    ports: ["127.0.0.1:${OPENRAG_WEB_PORT:-5173}:80"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ml"]
    ports: ["127.0.0.1:${OPENRAG_OLLAMA_PORT:-11434}:11434"]
    volumes: [ollamadata:/root/.ollama]

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  teidata:
  kekdata:
  ollamadata:
  eventredisdata:

networks:
  event-network:
    internal: true

secrets:
  event_redis_password:
    file: ${OPENRAG_EVENT_REDIS_SECRET_FILE:-../data/event_redis_password}
