name: openrag

x-openrag-environment: &openrag-environment
  OPENRAG_DATABASE_URL: postgresql+asyncpg://openrag:openrag@postgres:5432/openrag
  OPENRAG_DATABASE_POOL_SIZE: ${OPENRAG_DATABASE_POOL_SIZE:-10}
  OPENRAG_DATABASE_MAX_OVERFLOW: ${OPENRAG_DATABASE_MAX_OVERFLOW:-5}
  OPENRAG_DATABASE_POOL_TIMEOUT_SECONDS: ${OPENRAG_DATABASE_POOL_TIMEOUT_SECONDS:-5}
  OPENRAG_DATABASE_PROCESS_COUNT: ${OPENRAG_DATABASE_PROCESS_COUNT:-8}
  OPENRAG_DATABASE_CONNECTION_BUDGET: ${OPENRAG_DATABASE_CONNECTION_BUDGET:-160}
  OPENRAG_RUNTIME_METRIC_INTERVAL_SECONDS: ${OPENRAG_RUNTIME_METRIC_INTERVAL_SECONDS:-5}
  OPENRAG_REDIS_URL: redis://redis:6379/0
  OPENRAG_ENVIRONMENT: ${OPENRAG_ENVIRONMENT:-dev}
  OPENRAG_RELEASE: ${OPENRAG_RELEASE:-dev}
  OPENRAG_OTEL_ENDPOINT: ${OPENRAG_OTEL_ENDPOINT:-}
  OPENRAG_OTEL_SERVICE_NAME: openrag
  OPENRAG_OTEL_INSECURE: ${OPENRAG_OTEL_INSECURE:-true}
  OPENRAG_OTEL_TRACE_SAMPLE_RATIO: ${OPENRAG_OTEL_TRACE_SAMPLE_RATIO:-0.1}
  OPENRAG_QDRANT_URL: http://qdrant:6333
  OPENRAG_MINIO_ENDPOINT: http://minio:9000
  OPENRAG_MINIO_ACCESS_KEY: openrag
  OPENRAG_MINIO_SECRET_KEY: openrag123
  OPENRAG_MINIO_BUCKET: openrag-documents
  OPENRAG_UPLOAD_QUARANTINE_DIR: /tmp/openrag-quarantine
  OPENRAG_PARSER_MAX_PAGES: ${OPENRAG_PARSER_MAX_PAGES:-1000}
  OPENRAG_PARSER_MAX_PAGE_PIXELS: ${OPENRAG_PARSER_MAX_PAGE_PIXELS:-40000000}
  OPENRAG_PARSER_RENDER_DPI: ${OPENRAG_PARSER_RENDER_DPI:-200}
  OPENRAG_PARSER_TIMEOUT_SECONDS: ${OPENRAG_PARSER_TIMEOUT_SECONDS:-300}
  OPENRAG_PARSER_MAX_BLOCKS: ${OPENRAG_PARSER_MAX_BLOCKS:-100000}
  OPENRAG_PARSER_MAX_OUTPUT_CHARS: ${OPENRAG_PARSER_MAX_OUTPUT_CHARS:-10000000}
  OPENRAG_OCR_MODE: ${OPENRAG_OCR_MODE:-auto}
  OPENRAG_OCR_LANGUAGES: ${OPENRAG_OCR_LANGUAGES:-english}
  OPENRAG_OCR_MIN_CONFIDENCE: ${OPENRAG_OCR_MIN_CONFIDENCE:-0.5}
  OPENRAG_OCR_TEXT_SCORE: ${OPENRAG_OCR_TEXT_SCORE:-0.3}
  OPENRAG_OCR_BITMAP_AREA_THRESHOLD: ${OPENRAG_OCR_BITMAP_AREA_THRESHOLD:-0.05}
  OPENRAG_OCR_BATCH_SIZE: ${OPENRAG_OCR_BATCH_SIZE:-2}
  OPENRAG_TEI_URL: http://tei:80
  OPENRAG_EMBEDDING_BACKEND: ${OPENRAG_EMBEDDING_BACKEND:-hash}
  OPENRAG_EMBEDDING_MODEL_ID: ${OPENRAG_EMBEDDING_MODEL_ID:-openrag-hash-v1}
  OPENRAG_EMBEDDING_DIM: ${OPENRAG_EMBEDDING_DIM:-1024}
  OPENRAG_AUTHORITY_GENERATION_ID: ${OPENRAG_AUTHORITY_GENERATION_ID:-8a9848ab-6f79-5ec8-a906-a1f3c096cdb8}
  OPENRAG_INGEST_REVISION_PROTOCOL_V2_ENABLED: ${OPENRAG_INGEST_REVISION_PROTOCOL_V2_ENABLED:-false}
  OPENRAG_STALE_INGEST_RECOVERY_SECONDS: ${OPENRAG_STALE_INGEST_RECOVERY_SECONDS:-900}
  OPENRAG_KEK_FILE: /data/openrag_kek

x-openrag-backend: &openrag-backend
  image: openrag-backend:local
  build:
    context: ../backend
  environment: *openrag-environment
  volumes:
    - kekdata:/data
  networks:
    - default
    - observability-network

services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=${OPENRAG_POSTGRES_MAX_CONNECTIONS:-200}"]
    environment:
      POSTGRES_USER: openrag
      POSTGRES_PASSWORD: openrag
      POSTGRES_DB: openrag
    ports: ["127.0.0.1:55432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrag"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:56379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  event-redis:
    image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        password="$$(cat /run/secrets/event_redis_password)"
        test "$${#password}" -ge 16
        exec redis-server \
          --appendonly yes \
          --appendfsync always \
          --save "" \
          --dir /data \
          --user default off \
          --user openrag on ">$${password}" "~openrag:*" \
          +ping +info "+config|get" +xadd +xgroup +xinfo \
          +xreadgroup +xread +xrange +xack +xautoclaim +xpending +waitaof \
          +eval +get +set +incr +expire
    secrets:
      - event_redis_password
    networks:
      - event-network
    volumes:
      - eventredisdata:/data
    mem_limit: 512m
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          REDISCLI_AUTH="$$(cat /run/secrets/event_redis_password)"
          redis-cli --user openrag ping
      interval: 5s
      timeout: 3s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports: ["127.0.0.1:56333:6333"]
    volumes: [qdrantdata:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: openrag
      MINIO_ROOT_PASSWORD: openrag123
    ports: ["127.0.0.1:59000:9000", "127.0.0.1:59001:9001"]
    volumes: [miniodata:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    profiles: ["ml"]
    command: --model-id BAAI/bge-m3
    ports: ["127.0.0.1:58080:80"]
    volumes: [teidata:/data]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/80' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  migrate:
    <<: *openrag-backend
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  authority-provisioner:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/python
      - -m
      - openrag.cli
      - authority
      - provision
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    restart: "no"

  bootstrap:
    <<: *openrag-backend
    command: ["/app/.venv/bin/python", "-m", "openrag.bootstrap"]
    environment:
      <<: *openrag-environment
      OPENRAG_BOOTSTRAP_EMAIL: ${OPENRAG_BOOTSTRAP_EMAIL:-root@openrag.internal}
      OPENRAG_BOOTSTRAP_PASSWORD: ${OPENRAG_BOOTSTRAP_PASSWORD:-changeme123}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/uvicorn
      - --factory
      - openrag.api.app:create_app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      <<: *openrag-environment
      OPENRAG_EVENT_REDIS_URL: redis://openrag@event-redis:6379/0
      OPENRAG_EVENT_REDIS_PASSWORD_FILE: /run/secrets/event_redis_password
    secrets:
      - event_redis_password
    networks:
      - default
      - event-network
      - observability-network
    ports: ["127.0.0.1:${OPENRAG_API_PORT:-8000}:8000"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      authority-provisioner:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      event-redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/readyz')
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - interactive,default
      - -l
      - info
      - --concurrency=1
    mem_limit: ${OPENRAG_WORKER_MEMORY_LIMIT:-4g}
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=2g,noexec,nosuid,nodev
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  ingestion-worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - ingestion
      - -l
      - info
      - --concurrency=${OPENRAG_INGESTION_CONCURRENCY:-2}
      - --hostname=ingestion@%h
    mem_limit: ${OPENRAG_INGESTION_MEMORY_LIMIT:-8g}
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=4g,noexec,nosuid,nodev
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      authority-provisioner:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  event-scheduler:
    image: openrag-backend:local
    build:
      context: ../backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - beat
      - -l
      - info
      - --schedule=/tmp/celerybeat-schedule
      - --pidfile=/tmp/celerybeat.pid
    environment:
      OPENRAG_REDIS_URL: redis://redis:6379/0
      OPENRAG_ENVIRONMENT: ${OPENRAG_ENVIRONMENT:-dev}
      OPENRAG_OTEL_ENDPOINT: ${OPENRAG_OTEL_ENDPOINT:-}
      OPENRAG_OTEL_SERVICE_NAME: openrag-event-scheduler
    networks:
      - default
      - observability-network
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    restart: unless-stopped

  event-worker:
    image: openrag-backend:local
    build:
      context: ../backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - events
      - -l
      - info
      - --concurrency=2
      - --hostname=event@%h
    environment:
      OPENRAG_DATABASE_URL: postgresql+asyncpg://openrag:openrag@postgres:5432/openrag
      OPENRAG_REDIS_URL: redis://redis:6379/0
      OPENRAG_EVENT_REDIS_URL: redis://openrag@event-redis:6379/0
      OPENRAG_EVENT_REDIS_PASSWORD_FILE: /run/secrets/event_redis_password
      OPENRAG_ENVIRONMENT: ${OPENRAG_ENVIRONMENT:-dev}
      OPENRAG_RELEASE: ${OPENRAG_RELEASE:-dev}
      OPENRAG_OTEL_ENDPOINT: ${OPENRAG_OTEL_ENDPOINT:-}
      OPENRAG_OTEL_SERVICE_NAME: openrag-event-worker
    secrets:
      - event_redis_password
    networks:
      - default
      - event-network
      - observability-network
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      event-redis:
        condition: service_healthy
    healthcheck:
      # Starting a fresh application runtime here repeatedly imports the OCR
      # and embedding stack. On small hosts that probe can exceed its timeout
      # and compete with document parsing. Docker already detects process exit;
      # this lightweight probe verifies PID 1 is still the intended worker.
      test:
        - CMD-SHELL
        - >-
          grep -aq 'openrag.worker.celery_app:celery_app' /proc/1/cmdline
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    restart: unless-stopped

  run-worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - runs
      - -l
      - info
      - --concurrency=${OPENRAG_RUN_CONCURRENCY:-8}
      - --hostname=runs@%h
    environment:
      <<: *openrag-environment
      OPENRAG_EVENT_REDIS_URL: redis://openrag@event-redis:6379/0
      OPENRAG_EVENT_REDIS_PASSWORD_FILE: /run/secrets/event_redis_password
    secrets:
      - event_redis_password
    networks:
      - default
      - event-network
      - observability-network
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      authority-provisioner:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      event-redis:
        condition: service_healthy
    mem_limit: ${OPENRAG_RUN_WORKER_MEMORY_LIMIT:-4g}
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    restart: unless-stopped

  summary-worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - summaries
      - -l
      - info
      - --concurrency=${OPENRAG_SUMMARY_CONCURRENCY:-2}
      - --hostname=summaries@%h
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: ${OPENRAG_SUMMARY_WORKER_MEMORY_LIMIT:-2g}
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  enrichment-worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - enrichment
      - -l
      - info
      - --concurrency=${OPENRAG_ENRICHMENT_CONCURRENCY:-4}
      - --hostname=enrichment@%h
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      authority-provisioner:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    mem_limit: ${OPENRAG_ENRICHMENT_WORKER_MEMORY_LIMIT:-4g}
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    restart: unless-stopped

  evaluation-worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - evaluations
      - -l
      - info
      - --concurrency=${OPENRAG_EVALUATION_CONCURRENCY:-4}
      - --hostname=evaluations@%h
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      authority-provisioner:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    mem_limit: ${OPENRAG_EVALUATION_WORKER_MEMORY_LIMIT:-4g}
    pids_limit: 512
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    restart: unless-stopped

  model-worker:
    <<: *openrag-backend
    command:
      - /app/.venv/bin/celery
      - -A
      - openrag.worker.celery_app:celery_app
      - worker
      - -Q
      - models
      - -l
      - info
      - --concurrency=${OPENRAG_MODEL_PROBE_CONCURRENCY:-2}
      - --hostname=models@%h
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: ${OPENRAG_MODEL_WORKER_MEMORY_LIMIT:-2g}
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    restart: unless-stopped

  web:
    image: openrag-frontend:local
    build:
      context: ../frontend
    ports: ["127.0.0.1:${OPENRAG_WEB_PORT:-5173}:80"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ml"]
    ports: ["127.0.0.1:${OPENRAG_OLLAMA_PORT:-11434}:11434"]
    volumes: [ollamadata:/root/.ollama]

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks: [observability-network]
    mem_limit: 512m
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    security_opt: ["no-new-privileges:true"]
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${OPENRAG_METRICS_RETENTION:-30d}
      - --storage.tsdb.retention.size=${OPENRAG_METRICS_RETENTION_SIZE:-20GB}
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./observability/alerts.yaml:/etc/prometheus/alerts.yaml:ro
      - prometheusdata:/prometheus
    networks: [observability-network]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/config.yaml:ro
      - lokidata:/loki
    networks: [observability-network]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.10.5@sha256:ee21727732c7a7199cb71c3eee9153bbf23f9b0b87619f0555a0cf21a67f1a33
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempodata:/var/tempo
    networks: [observability-network]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    profiles: ["observability"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_SECURITY_ADMIN_USER: ${OPENRAG_GRAFANA_ADMIN_USER:-openrag-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ENFORCE_DOMAIN: "true"
      GF_SECURITY_COOKIE_SECURE: ${OPENRAG_GRAFANA_COOKIE_SECURE:-false}
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_LOG_MODE: console
    secrets: [grafana_admin_password]
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    networks: [observability-network]
    ports:
      - "127.0.0.1:${OPENRAG_GRAFANA_PORT:-53000}:3000"
    security_opt: ["no-new-privileges:true"]
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  teidata:
  kekdata:
  ollamadata:
  eventredisdata:
  prometheusdata:
  lokidata:
  tempodata:
  grafanadata:

networks:
  event-network:
    internal: true
  observability-network:
    internal: true

secrets:
  event_redis_password:
    file: ${OPENRAG_EVENT_REDIS_SECRET_FILE:-../data/event_redis_password}
  grafana_admin_password:
    file: ${OPENRAG_GRAFANA_PASSWORD_FILE:-../data/grafana_admin_password}
